services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: jchatmind-py-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jchatmind_py
    ports:
      - "5433:5432"
    volumes:
      - jchatmind_py_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jchatmind_py"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jchatmind_py_pgdata:
